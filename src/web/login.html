<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoWA — Login</title>
<link rel="icon" type="image/svg+xml" href="/public/logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);
  color:#f1f5f9;
  overflow:hidden;
}

/* Animated background blobs */
.bg-blob{
  position:fixed;border-radius:50%;filter:blur(80px);opacity:.15;pointer-events:none;
  animation:float 20s ease-in-out infinite;
}
.bg-blob:nth-child(1){width:400px;height:400px;background:#22c55e;top:-100px;left:-100px}
.bg-blob:nth-child(2){width:300px;height:300px;background:#3b82f6;bottom:-80px;right:-80px;animation-delay:-7s}
.bg-blob:nth-child(3){width:250px;height:250px;background:#a855f7;top:50%;left:50%;animation-delay:-14s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.05)}66%{transform:translate(-20px,20px) scale(.95)}}

.card{
  background:rgba(30,41,59,.8);
  backdrop-filter:blur(20px);
  border:1px solid rgba(148,163,184,.15);
  border-radius:16px;
  padding:48px 40px;
  max-width:400px;
  width:90%;
  text-align:center;
  position:relative;
  z-index:1;
  box-shadow:0 25px 50px -12px rgba(0,0,0,.5);
  animation:slideUp .5s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.logo-wrap{
  width:64px;height:64px;border-radius:16px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
  box-shadow:0 8px 32px rgba(34,197,94,.3);
}
.logo-wrap svg{width:32px;height:32px;color:#fff}

h1{font-size:24px;font-weight:700;margin-bottom:6px;letter-spacing:-.03em}
.subtitle{font-size:14px;color:#94a3b8;margin-bottom:32px;line-height:1.5}

.google-btn{
  display:inline-flex;align-items:center;gap:12px;
  background:#fff;color:#1e293b;
  border:none;border-radius:10px;
  padding:12px 28px;
  font-size:15px;font-weight:600;font-family:inherit;
  cursor:pointer;
  transition:all .2s;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  width:100%;
  justify-content:center;
}
.google-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.google-btn:active{transform:translateY(0)}

.google-btn svg{width:20px;height:20px;flex-shrink:0}

.divider{
  display:flex;align-items:center;gap:12px;
  margin:24px 0;color:#475569;font-size:12px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#334155}

.key-form{display:flex;gap:8px}
.key-input{
  flex:1;padding:10px 14px;border-radius:8px;
  border:1px solid #334155;background:#1e293b;color:#f1f5f9;
  font-size:14px;font-family:inherit;outline:none;
  transition:border-color .2s;
}
.key-input:focus{border-color:#22c55e}
.key-btn{
  padding:10px 16px;border-radius:8px;border:none;
  background:#22c55e;color:#000;font-weight:600;
  font-family:inherit;cursor:pointer;transition:opacity .2s;
}
.key-btn:hover{opacity:.85}

.footer{margin-top:32px;font-size:11px;color:#475569}
.footer strong{color:#64748b}

.error-msg{
  background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);
  border-radius:8px;padding:10px 14px;margin-bottom:20px;
  font-size:13px;color:#fca5a5;display:none;
}
</style>
</head>
<body>
<div class="bg-blob"></div>
<div class="bg-blob"></div>
<div class="bg-blob"></div>

<div class="card">
  <div class="logo-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
  </div>
  
  <h1>AutoWA Bot</h1>
  <p class="subtitle">Login untuk mengakses dashboard chatbot</p>
  
  <div class="error-msg" id="error-msg"></div>
  
  <!-- Google Login -->
  <a href="/auth/google" class="google-btn" id="google-btn">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Sign in with Google
  </a>
  
  <div class="divider">atau masuk dengan key</div>
  
  <!-- Key Login (backwards compatible) -->
  <form class="key-form" onsubmit="loginWithKey(event)">
    <input type="text" class="key-input" id="key-input" placeholder="Masukkan OWNER_NUMBER">
    <button type="submit" class="key-btn">→</button>
  </form>
  
  <div class="footer">
    © 2026 <strong>Luthfi Alfaridz</strong> — Founder of <strong>ReonTech</strong>
  </div>
</div>

<script>
// Check if there's an error in URL params
const params = new URLSearchParams(window.location.search);
const err = params.get('error');
if (err) {
  const el = document.getElementById('error-msg');
  if (err === 'unauthorized') el.textContent = '⛔ Email tidak diizinkan. Hubungi admin.';
  else if (err === 'auth_failed') el.textContent = '❌ Autentikasi Google gagal. Coba lagi.';
  else el.textContent = '❌ ' + err;
  el.style.display = 'block';
}

// Check if Google OAuth is configured
fetch('/auth/check').then(r=>r.json()).then(d=>{
  if(!d.googleEnabled) {
    document.getElementById('google-btn').style.display='none';
    document.querySelector('.divider').style.display='none';
  }
}).catch(()=>{});

function loginWithKey(e) {
  e.preventDefault();
  const key = document.getElementById('key-input').value.trim();
  if (key) window.location.href = '/dashboard?key=' + encodeURIComponent(key);
}
</script>
</body>
</html>
